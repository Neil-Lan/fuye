<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>我的收藏 - 副业发现平台</title>
  <meta name="description" content="查看您收藏的副业平台和骗局预警">
  <link rel="stylesheet" href="css/style.css">
  <style>
    .fav-tabs {
      display: flex;
      gap: 8px;
      margin-bottom: 24px;
      border-bottom: 2px solid var(--border-color);
      padding-bottom: 8px;
    }
    .fav-tab {
      padding: 10px 20px;
      border-radius: 8px 8px 0 0;
      cursor: pointer;
      transition: all 0.2s;
      font-weight: 500;
      background: var(--bg-color);
      color: var(--text-secondary);
    }
    .fav-tab:hover {
      background: #e2e8f0;
    }
    .fav-tab.active {
      background: var(--primary-color);
      color: white;
    }
    .fav-tab .count {
      display: inline-block;
      background: rgba(255,255,255,0.2);
      padding: 2px 8px;
      border-radius: 10px;
      font-size: 0.8rem;
      margin-left: 6px;
    }
    .fav-tab:not(.active) .count {
      background: var(--border-color);
    }
    .fav-item {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 16px;
      background: white;
      border-radius: 12px;
      margin-bottom: 12px;
      box-shadow: var(--shadow-sm);
      transition: all 0.2s;
    }
    .fav-item:hover {
      box-shadow: var(--shadow-md);
    }
    .fav-item-info {
      display: flex;
      align-items: center;
      gap: 16px;
      flex: 1;
      cursor: pointer;
    }
    .fav-item-icon {
      width: 48px;
      height: 48px;
      border-radius: 12px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 1.5rem;
      background: var(--bg-color);
    }
    .fav-item-icon.platform {
      background: #eff6ff;
    }
    .fav-item-icon.scam {
      background: #fef2f2;
    }
    .fav-item-details h4 {
      font-size: 1rem;
      margin-bottom: 4px;
    }
    .fav-item-details p {
      font-size: 0.85rem;
      color: var(--text-secondary);
    }
    .fav-item-date {
      font-size: 0.75rem;
      color: var(--text-muted);
      margin-top: 4px;
    }
    .fav-item-actions {
      display: flex;
      gap: 8px;
    }
    .fav-remove-btn {
      padding: 8px 16px;
      border-radius: 6px;
      background: var(--bg-color);
      color: var(--text-secondary);
      font-size: 0.85rem;
      cursor: pointer;
      transition: all 0.2s;
    }
    .fav-remove-btn:hover {
      background: #fef2f2;
      color: var(--danger-color);
    }
    .empty-state {
      text-align: center;
      padding: 60px 20px;
      color: var(--text-secondary);
    }
    .empty-state-icon {
      font-size: 4rem;
      margin-bottom: 16px;
    }
    .empty-state h3 {
      margin-bottom: 8px;
      color: var(--text-primary);
    }
    .clear-all-btn {
      padding: 8px 16px;
      border-radius: 6px;
      background: #fef2f2;
      color: var(--danger-color);
      font-size: 0.85rem;
      cursor: pointer;
      margin-top: 16px;
    }
    .clear-all-btn:hover {
      background: #fee2e2;
    }
  </style>
</head>
<body>
  <div class="page-wrapper">
    <nav class="navbar">
      <div class="navbar-inner">
        <a href="index.html" class="logo"><span class="logo-icon">🎯</span><span>副业发现</span></a>
        <button class="menu-toggle" onclick="document.querySelector('.nav-links').classList.toggle('active')">☰</button>
        <div class="nav-links">
          <a href="index.html" class="nav-link">首页</a>
          <a href="platforms.html" class="nav-link">找副业</a>
          <a href="scams.html" class="nav-link">骗局预警</a>
          <a href="match.html" class="nav-link">测一测</a>
          <a href="submit.html" class="nav-link">我要投稿</a>
          <a href="favorites.html" class="nav-link active">❤️ 收藏</a>
        </div>
      </div>
    </nav>

    <header class="page-header">
      <div class="container">
        <h1>❤️ 我的收藏</h1>
        <p>收藏你感兴趣的副业平台和骗局预警</p>
      </div>
    </header>

    <main class="main-content">
      <div class="container">
        <div class="fav-tabs">
          <div class="fav-tab active" onclick="switchTab('platform')">
            🏢 平台<span class="count" id="platform-count">0</span>
          </div>
          <div class="fav-tab" onclick="switchTab('scam')">
            ⚠️ 骗局<span class="count" id="scam-count">0</span>
          </div>
        </div>

        <div id="favorites-list"></div>
      </div>
    </main>

    <footer class="footer">
      <div class="footer-inner">
        <div class="footer-grid">
          <div class="footer-section">
            <h4>快速链接</h4>
            <ul>
              <li><a href="index.html">首页</a></li>
              <li><a href="platforms.html">平台大全</a></li>
              <li><a href="scams.html">骗局预警</a></li>
              <li><a href="match.html">副业匹配</a></li>
              <li><a href="disclaimer.html">免责声明</a></li>
              <li><a href="privacy.html">隐私政策</a></li>
            </ul>
          </div>
        </div>
        <div class="footer-bottom"><p>© 2026 副业发现平台 · 全部功能免费开放</p></div>
      </div>
    </footer>
  </div>

  <script src="js/favorites.js"></script>
  <script>
    let currentTab = 'platform';
    
    function loadFavorites() {
      const favorites = getFavorites();
      const platforms = favorites.filter(f => f.type === 'platform');
      const scams = favorites.filter(f => f.type === 'scam');
      
      document.getElementById('platform-count').textContent = platforms.length;
      document.getElementById('scam-count').textContent = scams.length;
      
      renderFavorites();
    }
    
    function switchTab(tab) {
      currentTab = tab;
      document.querySelectorAll('.fav-tab').forEach(t => t.classList.remove('active'));
      event.target.closest('.fav-tab').classList.add('active');
      renderFavorites();
    }
    
    function renderFavorites() {
      const favorites = getFavorites().filter(f => f.type === currentTab);
      const container = document.getElementById('favorites-list');
      
      if (favorites.length === 0) {
        const emptyMsg = currentTab === 'platform' 
          ? { icon: '🏢', title: '暂无收藏的平台', desc: '去平台列表看看有哪些靠谱副业吧' }
          : { icon: '⚠️', title: '暂无收藏的骗局', desc: '收藏感兴趣的骗局，方便随时查看' };
        
        container.innerHTML = `
          <div class="empty-state">
            <div class="empty-state-icon">${emptyMsg.icon}</div>
            <h3>${emptyMsg.title}</h3>
            <p>${emptyMsg.desc}</p>
            <a href="${currentTab === 'platform' ? 'platforms.html' : 'scams.html'}" class="btn btn-primary" style="margin-top:20px;">
              ${currentTab === 'platform' ? '去逛逛平台' : '查看骗局预警'}
            </a>
          </div>
        `;
        return;
      }
      
      container.innerHTML = favorites.map(fav => {
        const date = new Date(fav.addedAt);
        const dateStr = `${date.getMonth() + 1}月${date.getDate()}日收藏`;
        const icon = currentTab === 'platform' ? '🏢' : '⚠️';
        const iconClass = currentTab === 'platform' ? 'platform' : 'scam';
        const detailUrl = currentTab === 'platform' 
          ? `platform-detail.html?id=${encodeURIComponent(fav.id)}`
          : `scam-detail.html?id=${encodeURIComponent(fav.id)}`;
        
        return `
          <div class="fav-item">
            <div class="fav-item-info" onclick="location.href='${detailUrl}'">
              <div class="fav-item-icon ${iconClass}">${icon}</div>
              <div class="fav-item-details">
                <h4>${fav.name}</h4>
                <p>${fav.data.type || fav.data.平台类型 || fav.data.骗局类型 || ''}</p>
                <div class="fav-item-date">${dateStr}</div>
              </div>
            </div>
            <div class="fav-item-actions">
              <button class="fav-remove-btn" onclick="handleRemove('${fav.type}', '${fav.id}', '${fav.name}')">
                🗑️ 删除
              </button>
            </div>
          </div>
        `;
      }).join('') + `
        <div style="text-align:center;">
          <button class="clear-all-btn" onclick="handleClearAll()">
            🗑️ 清空所有收藏
          </button>
        </div>
      `;
    }
    
    function handleRemove(type, id, name) {
      if (confirm(`确定要取消收藏「${name}」吗？`)) {
        const result = removeFavorite(type, id);
        showToast(result.message);
        loadFavorites();
      }
    }
    
    function handleClearAll() {
      const result = clearAllFavorites();
      if (result.success) {
        showToast(result.message);
        loadFavorites();
      }
    }
    
    // 页面加载
    document.addEventListener('DOMContentLoaded', loadFavorites);
  </script>
</body>
</html>
