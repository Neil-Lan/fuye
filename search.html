<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>搜索结果 - 副业避坑导航</title>
  <meta name="description" content="搜索副业平台和骗局预警结果">
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <div class="page-wrapper">
    <nav class="navbar">
      <div class="navbar-inner">
        <a href="index.html" class="logo"><span class="logo-icon">🛡️</span><span>副业避坑导航</span></a>
        <button class="menu-toggle" onclick="document.querySelector('.nav-links').classList.toggle('active')">☰</button>
        <div class="nav-links">
          <a href="index.html" class="nav-link">首页</a>
          <a href="platforms.html" class="nav-link">平台大全</a>
          <a href="scams.html" class="nav-link">骗局预警</a>
          <a href="match.html" class="nav-link">副业匹配</a>
          <a href="submit.html" class="nav-link">我要投稿</a>
        </div>
      </div>
    </nav>

    <header class="page-header">
      <div class="container">
        <h1>🔍 搜索结果</h1>
        <p>关键词：<span id="search-query"></span></p>
      </div>
    </header>

    <main class="main-content">
      <div class="container">
        <div class="search-section" style="margin-bottom:24px;">
          <div class="search-box">
            <input type="text" id="search-input" class="search-input" placeholder="重新搜索...">
            <button class="search-btn" onclick="doSearch()">🔍 搜索</button>
          </div>
        </div>

        <div id="search-results">
          <div class="loading">加载中...</div>
        </div>

        <div style="margin-top:32px;text-align:center;">
          <a href="platforms.html" class="btn btn-outline">浏览全部平台</a>
          <a href="scams.html" class="btn btn-outline" style="margin-left:8px;">浏览骗局预警</a>
        </div>
      </div>
    </main>

    <footer class="footer">
      <div class="footer-inner">
        <div class="footer-grid">
          <div class="footer-section">
            <h4>快速链接</h4>
            <ul>
              <li><a href="index.html">首页</a></li>
              <li><a href="platforms.html">平台大全</a></li>
              <li><a href="scams.html">骗局预警</a></li>
              <li><a href="match.html">副业匹配</a></li>
            </ul>
          </div>
        </div>
        <div class="footer-bottom"><p>© 2026 副业避坑导航</p></div>
      </div>
    </footer>
  </div>
  <script src="js/search.js"></script>
  <script>
    const params = new URLSearchParams(window.location.search);
    document.getElementById('search-input').value = params.get('q') || '';
    document.getElementById('search-input').addEventListener('keypress', e => {
      if (e.key === 'Enter') doSearch();
    });
    function doSearch() {
      const q = document.getElementById('search-input').value.trim();
      if (q) location.href = 'search.html?q=' + encodeURIComponent(q);
    }
  </script>
  <!-- 数据统计 -->
  <script src="js/analytics.js"></script>
</body>
</html>
