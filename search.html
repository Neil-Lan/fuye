<html lang="zh-CN">
<head>
  <meta charset="UTF-8">

  <link rel="stylesheet" href="css/style.css">

  <meta property="og:locale" content="zh_CN">
  <style>
    .search-page-container {
      max-width: 1000px;
      margin: 0 auto;
      padding: 40px 20px;
    }
    .search-hero {
      text-align: center;
      margin-bottom: 32px;
    }
    .search-hero h1 {
      font-size: 1.8rem;
      margin-bottom: 8px;
    }
    .search-hero p {
      color: var(--text-secondary);
    }
    .search-box-large {
      display: flex;
      gap: 8px;
      max-width: 600px;
      margin: 0 auto;
    }
    .search-box-large input {
      flex: 1;
      padding: 14px 20px;
      font-size: 1rem;
      border: 2px solid #e5e7eb;
      border-radius: 12px;
      transition: border-color 0.2s;
    }
    .search-box-large input:focus {
      outline: none;
      border-color: var(--primary-color);
    }
    .search-box-large button {
      padding: 14px 28px;
      background: var(--primary-color);
      color: white;
      border: none;
      border-radius: 12px;
      font-size: 1rem;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.2s;
    }
    .search-box-large button:hover {
      transform: translateY(-1px);
      box-shadow: 0 4px 12px rgba(102, 126, 234, 0.4);
    }
    .search-sidebar {
      display: grid;
      grid-template-columns: 1fr 280px;
      gap: 24px;
    }
    @media (max-width: 768px) {
      .search-sidebar {
        grid-template-columns: 1fr;
      }
    }
    .search-sidebar-left {
      min-width: 0;
    }
    .search-sidebar-right {
      position: sticky;
      top: 80px;
      height: fit-content;
    }
    .history-card, .hot-card {
      background: white;
      border-radius: 12px;
      padding: 16px;
      margin-bottom: 16px;
      box-shadow: 0 2px 8px rgba(0,0,0,0.06);
    }
    .advanced-filter-bar {
      background: white;
      border-radius: 12px;
      padding: 16px;
      margin-bottom: 20px;
      box-shadow: 0 2px 8px rgba(0,0,0,0.06);
    }
    .filter-select {
      padding: 6px 12px;
      border: 1px solid #e5e7eb;
      border-radius: 8px;
      font-size: 0.85rem;
      background: white;
      cursor: pointer;
    }
    .filter-select:focus {
      outline: none;
      border-color: var(--primary-color);
    }
    .section-header {
      margin-bottom: 16px;
    }
    .section-title {
      font-size: 1.1rem;
      font-weight: 600;
      color: #374151;
      padding-bottom: 8px;
      border-bottom: 2px solid #e5e7eb;
    }
    .card-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
      gap: 16px;
    }
    .card {
      background: white;
      border-radius: 10px;
      padding: 16px;
      box-shadow: 0 2px 8px rgba(0,0,0,0.06);
      transition: all 0.2s;
    }
    .card:hover {
      box-shadow: 0 4px 16px rgba(0,0,0,0.1);
      transform: translateY(-2px);
    }
    .platform-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 10px;
    }
    .platform-name {
      font-weight: 600;
      font-size: 1rem;
    }
    .platform-type {
      font-size: 0.75rem;
      padding: 2px 8px;
      background: #eff6ff;
      color: var(--primary-color);
      border-radius: 10px;
    }
    .platform-tags {
      display: flex;
      flex-wrap: wrap;
      gap: 6px;
      margin-bottom: 12px;
    }
    .tag {
      font-size: 0.75rem;
      padding: 2px 8px;
      background: #f3f4f6;
      color: #6b7280;
      border-radius: 10px;
    }
    .platform-stats {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding-top: 12px;
      border-top: 1px solid #f3f4f6;
    }
    .stat-item {
      text-align: center;
    }
    .stat-value {
      font-weight: 600;
      font-size: 0.9rem;
      color: #374151;
    }
    .stat-label {
      font-size: 0.7rem;
      color: #9ca3af;
    }
    .trust-badge {
      font-size: 0.7rem;
      padding: 2px 8px;
      border-radius: 10px;
    }
    .trust-a { background: #dcfce7; color: #16a34a; }
    .trust-b { background: #fef9c3; color: #ca8a04; }
    .trust-c { background: #fed7aa; color: #ea580c; }
    .trust-d, .trust-e, .trust-f { background: #fee2e2; color: #dc2626; }
    .scam-card {
      border-left: 3px solid #ef4444;
    }
    .scam-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 8px;
    }
    .scam-name {
      font-weight: 600;
    }
    .danger-level {
      font-size: 0.7rem;
      padding: 2px 8px;
      border-radius: 10px;
    }
    .danger-high { background: #fee2e2; color: #dc2626; }
    .danger-medium { background: #fed7aa; color: #ea580c; }
    .danger-low { background: #dcfce7; color: #16a34a; }
    .scam-stats {
      display: flex;
      gap: 16px;
      font-size: 0.85rem;
      color: #6b7280;
      margin-bottom: 8px;
    }
    .mb-6 { margin-bottom: 24px; }
    .empty-state {
      text-align: center;
      padding: 60px 20px;
    }
    .empty-icon {
      font-size: 64px;
      margin-bottom: 16px;
    }
    .empty-state h3 {
      font-size: 1.2rem;
      margin-bottom: 8px;
    }
    .text-muted {
      color: var(--text-secondary);
    }
    .btn {
      display: inline-block;
      padding: 10px 20px;
      border-radius: 8px;
      text-decoration: none;
      transition: all 0.2s;
      cursor: pointer;
      border: none;
      font-size: 0.9rem;
    }
    .btn-outline {
      background: white;
      border: 1px solid #e5e7eb;
      color: #374151;
    }
    .btn-outline:hover {
      border-color: var(--primary-color);
      color: var(--primary-color);
    }
  </style>
