  <script>
    async function loadScamDetail() {
      const params = new URLSearchParams(window.location.search);
      const scamId = params.get('id') || params.get('name');
      if (!scamId) {
        document.getElementById('scam-detail').innerHTML = '<p class="text-muted">未指定骗局</p>';
        return;
      }

      // 获取基础路径（兼容GitHub Pages子目录部署）
      const basePath = window.location.pathname.includes('/fuye/') ? '/fuye' : '';

      try {
        const res = await fetch(`${basePath}/data/scams.json`);
        const data = await res.json();
        let scam = data.骗局案例.find(s => s.骗局名称 === scamId);
        if (!scam) {
          // 模糊匹配
          scam = data.骗局案例.find(s => s.骗局名称.includes(scamId) || scamId.includes(s.骗局名称));
        }

        if (!scam) {
          document.getElementById('scam-detail').innerHTML = '<p class="text-muted">未找到该骗局</p>';
          return;
        }

        renderScamDetail(scam);
        initFavoriteAndActions(scam);
      } catch (e) {
        console.error(e);
        document.getElementById('scam-detail').innerHTML = '<p class="text-muted">加载失败</p>';
      }
    }
    
    let currentScam = null;
    
    function initFavoriteAndActions(scam) {
      currentScam = scam;
      const scamName = scam?.骗局名称;
      if (!scamName) return;
      
      const favBtn = document.querySelector('.favorite-btn');
      if (favBtn) {
        favBtn.dataset.favoriteBtn = `scam-${scamName}`;
        favBtn.dataset.name = scamName;
        initFavoriteButton('scam', scamName);
      }
      
      document.getElementById('detail-actions').style.display = 'flex';
    }
    
    function showShareModal() {
      document.getElementById('share-modal').classList.add('active');
    }
    
    function closeShareModal() {
      document.getElementById('share-modal').classList.remove('active');
    }
    
    function shareToWechat() {
      const title = currentScam?.骗局名称 || '骗局预警';
      alert(`微信分享提示：\n\n长按复制链接发送给好友：\n\n${window.location.href}\n\n「${title}」是诈骗陷阱，提醒朋友注意避坑！`);
      copyShareLink();
    }
    
    function shareToXiaoHongShu() {
      const title = currentScam?.骗局名称 || '骗局';
      alert(`小红书分享提示：\n\n复制链接后打开小红书APP分享：\n\n${window.location.href}\n\n#防骗 #骗局预警 #${title}`);
      copyShareLink();
    }
    
    function copyShareLink() {
      navigator.clipboard.writeText(window.location.href).then(() => {
        showToast('链接已复制！');
        closeShareModal();
      }).catch(() => {
        prompt('复制失败，请手动复制：', window.location.href);
      });
    }
    
    document.getElementById('share-modal')?.addEventListener('click', function(e) {
      if (e.target === this) closeShareModal();
    });

    function renderScamDetail(s) {
      document.title = s.骗局名称 + ' - 骗局预警';
      document.getElementById('scam-title').textContent = s.骗局名称;
      document.getElementById('scam-subtitle').textContent = s.骗局类型 || '';

      const dangerClass = s.危险等级 === '高危' ? 'danger-high' : 
                          s.危险等级 === '中危' ? 'danger-medium' : 'danger-low';

      // 构建基本信息卡片HTML
      const basicInfoCard = `
        <div class="info-card info-card-danger">
          <div class="info-card-icon">💰</div>
          <div class="info-card-content">
            <span class="info-card-label">涉案金额</span>
            <span class="info-card-value">${s.涉案金额 || '不等'}</span>
          </div>
        </div>
        <div class="info-card info-card-primary">
          <div class="info-card-icon">👥</div>
          <div class="info-card-content">
            <span class="info-card-label">受害人数</span>
            <span class="info-card-value">${s.受害人数 || '不详'}</span>
          </div>
        </div>
        <div class="info-card info-card-warning">
          <div class="info-card-icon">⚠️</div>
          <div class="info-card-content">
            <span class="info-card-label">危险等级</span>
            <span class="info-card-value ${dangerClass}">${s.危险等级 || '中危'}</span>
          </div>
        </div>
      `;

      // 构建别名HTML
      const aliasHtml = (s.别名 || []).length > 0 ? `
        <div class="alias-section">
          <span class="alias-label">常见别名：</span>
          <div class="scam-tags">
            ${s.别名.map(a => `<span class="tag">${a}</span>`).join('')}
          </div>
        </div>
      ` : '';

      // 构建作案手法步骤卡片HTML
      const stepsHtml = (s.作案手法 || []).map((step, i) => {
        // 提取"第X步："部分并突出显示
        const match = step.match(/^第[一二三四五六七八九十]+步[：:]\s*/);
        const stepLabel = match ? match[0] : `第${i + 1}步：`;
        const stepContent = match ? step.slice(match[0].length) : step;
        return `
          <div class="step-card">
            <div class="step-number">${i + 1}</div>
            <div class="step-text"><strong>${stepLabel}</strong>${stepContent}</div>
          </div>
        `;
      }).join('');

      // 构建识别方法提示框HTML
      const识别方法Html = (s.识别方法 || []).map((item, i) => `
        <div class="warning-item">
          <div class="warning-icon">⚠️</div>
          <div class="warning-text">${item}</div>
        </div>
      `).join('');

      // 构建真实案例HTML
      const casesHtml = (s.真实案例 || []).map((c, i) => {
        // 提取"案例X："部分
        const match = c.match(/^案例\d+[：:]\s*/);
        const caseContent = match ? c.slice(match[0].length) : c;
        return `
          <div class="case-card">
            <div class="case-header">
              <span class="case-badge">案例 ${i + 1}</span>
            </div>
            <p class="case-content">${caseContent}</p>
          </div>
        `;
      }).join('');

      // 构建信息来源HTML
      const sourceHtml = s.信息来源 ? `
        <div class="source-section">
          <div class="source-header">
            <span class="source-icon">📋</span>
            <span>信息来源</span>
          </div>
          <div class="source-content">
            <p>${s.信息来源}</p>
            ${s.案例核实?.通报时间 ? `
            <div class="source-meta">
              <div class="source-meta-item">
                <span class="meta-label">通报时间</span>
                <span class="meta-value">${s.案例核实.通报时间}</span>
              </div>
              ${s.案例核实?.涉案数据 ? `
              <div class="source-meta-item">
                <span class="meta-label">涉案数据</span>
                <span class="meta-value">${s.案例核实.涉案数据}</span>
              </div>
              ` : ''}
            </div>
            ` : ''}
          </div>
        </div>
      ` : '';

      let html = `
        <!-- 标题区域 -->
        <div class="scam-header-card">
          <div class="scam-header-content">
            <h1 class="scam-title">${s.骗局名称}</h1>
            <div class="scam-meta">
              <span class="danger-level ${dangerClass}">⚠️ ${s.危险等级 || '中危'}</span>
              <span class="tag">${s.骗局类型 || '其他'}</span>
            </div>
          </div>
        </div>

        <!-- 基本信息区域 - 三栏卡片 -->
        <div class="info-cards-grid">
          ${basicInfoCard}
        </div>
        ${aliasHtml}

        <!-- 主要内容区域 - 两栏布局 -->
        <div class="scam-main-content">
          <!-- 左栏：作案手法 -->
          <div class="content-section">
            <div class="section-card section-danger">
              <h2 class="section-title">
                <span class="section-icon">🎯</span>
                作案手法
              </h2>
              <div class="steps-container">
                ${stepsHtml}
              </div>
            </div>
          </div>
          
          <!-- 右栏：识别方法 -->
          <div class="content-section">
            <div class="section-card section-warning">
              <h2 class="section-title">
                <span class="section-icon">🔍</span>
                如何识别
              </h2>
              <div class="warnings-container">
                ${识别方法Html}
              </div>
            </div>
          </div>
        </div>

        <!-- 真实案例区域 -->
        ${casesHtml ? `
        <div class="cases-section">
          <div class="section-card section-primary">
            <h2 class="section-title">
              <span class="section-icon">📖</span>
              真实案例
            </h2>
            <div class="cases-grid">
              ${casesHtml}
            </div>
          </div>
        </div>
        ` : ''}

        <!-- 信息来源区域 -->
        ${sourceHtml}
      `;

      if (s.被骗后怎么办 && s.被骗后怎么办.length > 0) {
        document.getElementById('help-section').style.display = 'block';
      }

      document.getElementById('scam-detail').innerHTML = html;
    }

    document.addEventListener('DOMContentLoaded', loadScamDetail);
  </script>
  <!-- 数据统计 -->
  <script src="js/analytics.js"></script>
  <!-- AI助手 -->
  <script src="js/ai-assistant.js"></script>
<script>document.querySelectorAll(".nav-link").forEach(l=>l.addEventListener("click",()=>{document.querySelector(".nav-links")?.classList.remove("active")}));</script>
</body>
</html>
